<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Secretário">
<meta name="theme-color" content="#0f172a">
<title>Secretário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #64748b;
    --subtle: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
  .header-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-pct { font-size: 28px; font-weight: 800; line-height: 1; font-family: 'DM Mono', monospace; }
  .stat-detail { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .alert { background: #1e1040; border: 1px solid #6d28d9; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #c4b5fd; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px; }
  .alert strong { color: #ddd6fe; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
  .week-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; font-family: 'DM Mono', monospace; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
  .day-cell { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 7px 5px; cursor: pointer; min-height: 70px; display: flex; flex-direction: column; gap: 3px; transition: border-color 0.15s, background 0.15s; user-select: none; }
  .day-cell.today { border-color: #3b82f6; background: #172033; }
  .day-cell.selected { background: #273549; border-color: #475569; }
  .day-cell.fds .day-name { color: #3b82f6 !important; }
  .day-name { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; }
  .day-num { font-size: 17px; font-weight: 800; line-height: 1; }
  .day-cell.today .day-num { color: #3b82f6; }
  .day-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: auto; }
  .dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid transparent; flex-shrink: 0; }
  .detail { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-top: 6px; }
  .detail-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; font-family: 'DM Mono', monospace; }
  .block-row { display: flex; align-items: center; gap: 10px; border-radius: 9px; padding: 10px 11px; margin-bottom: 7px; cursor: pointer; transition: opacity 0.15s; user-select: none; }
  .block-row.perdido { opacity: 0.45; }
  .block-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #fff; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .block-info { flex: 1; min-width: 0; }
  .block-type { font-size: 12px; font-weight: 700; }
  .block-note { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .block-status { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .status-feito { background: #14532d; color: #4ade80; }
  .status-planejado { background: var(--surface); color: var(--muted); }
  .status-perdido { background: #450a0a; color: #f87171; }
  .detail-hint { font-size: 10px; color: var(--border); text-align: right; margin-top: 4px; }
  .empty-day { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 0; }
  .footer { font-size: 10px; color: var(--border); text-align: center; margin-top: 20px; font-family: 'DM Mono', monospace; }
  .sync-bar { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; padding: 6px; background: var(--surface); border-radius: 8px; margin-bottom: 16px; }
  .sync-bar.ok { color: #4ade80; }
  .sync-bar.stale { color: #fbbf24; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Secretário</h1>
    <div class="header-sub" id="headerSub">carregando...</div>
  </div>
  <div class="sync-bar" id="syncBar">carregando dados...</div>
  <div class="stats" id="stats"></div>
  <div id="alertsContainer"></div>
  <div class="legend" id="legend"></div>
  <div id="weeksContainer"></div>
  <div class="detail" id="detail"></div>
  <div class="footer">atualizado via Claude Code · secretarioclaude.netlify.app</div>
</div>

<script>
const BLOCKS = {
  treino:      { label:'Treino',      short:'TRN', color:'#3b82f6', bg:'#1a3560', text:'#93c5fd' },
  dissertacao: { label:'Dissertação', short:'DIS', color:'#a78bfa', bg:'#2e1b5e', text:'#c4b5fd' },
  aula:        { label:'Aula',        short:'AUL', color:'#fbbf24', bg:'#3d2d00', text:'#fde68a' },
  trabalho:    { label:'Trabalho',    short:'TRB', color:'#64748b', bg:'#1e293b', text:'#94a3b8' },
};
const STATUS_CYCLE = ['planejado','feito','perdido'];
const DIAS = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const DIAS_FULL = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let planData = null;
let selected = null;

function getDow(dateStr) {
  return (new Date(dateStr + 'T12:00:00').getDay() + 6) % 7;
}

function getToday() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

async function loadPlan() {
  const syncBar = document.getElementById('syncBar');
  try {
    const resp = await fetch('./plan.json?t=' + Date.now());
    if (!resp.ok) throw new Error('fetch failed');
    planData = await resp.json();
    localStorage.setItem('secretario-cache', JSON.stringify(planData));
    syncBar.textContent = '● sincronizado com servidor';
    syncBar.className = 'sync-bar ok';
  } catch (e) {
    try {
      const cached = localStorage.getItem('secretario-cache');
      if (cached) {
        planData = JSON.parse(cached);
        syncBar.textContent = '● offline (dados em cache)';
        syncBar.className = 'sync-bar stale';
      }
    } catch {}
  }
  if (!planData) {
    syncBar.textContent = '✕ sem dados';
    return;
  }
  const dates = Object.keys(planData.days).sort();
  const today = getToday();
  selected = dates.includes(today) ? today : dates[0];
  render();
}

function render() {
  renderStats();
  renderAlerts();
  renderLegend();
  renderWeeks();
  renderDetail();
  updateHeader();
}

function renderStats() {
  let tF=0,tT=0,dF=0,dT=0;
  Object.values(planData.days).forEach(blocks => blocks.forEach(b => {
    if (b.type==='treino') { tT++; if(b.status==='feito') tF++; }
    if (b.type==='dissertacao') { dT++; if(b.status==='feito') dF++; }
  }));
  const pct = (f,t) => t ? Math.round(f/t*100) : null;
  const col = p => p===null?'#64748b':p>=70?'#4ade80':p>=40?'#fbbf24':'#f87171';
  const tp = pct(tF,tT), dp = pct(dF,dT);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Treino</div>
      <div class="stat-pct" style="color:${col(tp)}">${tp!==null?tp+'%':'--'}</div>
      <div class="stat-detail">${tF}/${tT} feitos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Dissertação</div>
      <div class="stat-pct" style="color:${col(dp)}">${dp!==null?dp+'%':'--'}</div>
      <div class="stat-detail">${dF}/${dT} blocos</div>
    </div>`;
}

function renderAlerts() {
  const c = document.getElementById('alertsContainer');
  if (!planData.alerts || !planData.alerts.length) { c.innerHTML = ''; return; }
  c.innerHTML = planData.alerts.map(a =>
    `<div class="alert"><span>🎯</span><span>${a}</span></div>`
  ).join('');
}

function renderLegend() {
  document.getElementById('legend').innerHTML = Object.entries(BLOCKS).map(([k,v]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${v.color}"></div>${v.label}</div>`
  ).join('');
}

function renderWeeks() {
  const dates = Object.keys(planData.days).sort();
  const weeks = [];
  for (let i = 0; i < dates.length; i += 7) {
    weeks.push(dates.slice(i, i + 7));
  }
  const today = getToday();
  const container = document.getElementById('weeksContainer');
  container.innerHTML = '';

  weeks.forEach((week, wi) => {
    const label = document.createElement('div');
    label.className = 'week-label';
    label.textContent = `Semana ${wi+1}`;
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'week-grid';

    week.forEach(key => {
      const d = new Date(key + 'T12:00:00');
      const dow = getDow(key);
      const isFDS = dow >= 5;
      const isToday = key === today;
      const isSel = key === selected;
      const blocks = planData.days[key] || [];

      const cell = document.createElement('div');
      cell.className = `day-cell${isToday?' today':''}${isSel?' selected':''}${isFDS?' fds':''}`;

      const dots = ['treino','dissertacao','aula','trabalho'].map(type => {
        const b = blocks.find(x => x.type===type);
        if (!b) return '';
        const filled = b.status==='feito';
        const lost = b.status==='perdido';
        return `<div class="dot" style="background:${filled?BLOCKS[type].color:'transparent'};border-color:${lost?'#334155':BLOCKS[type].color};${lost?'opacity:0.3':''}"></div>`;
      }).join('');

      cell.innerHTML = `
        <div class="day-name">${DIAS[dow]}</div>
        <div class="day-num">${d.getDate()}</div>
        <div class="day-dots">${dots}</div>`;
      cell.addEventListener('click', () => { selected = key; renderWeeks(); renderDetail(); });
      grid.appendChild(cell);
    });
    container.appendChild(grid);
  });
}

function renderDetail() {
  const blocks = planData.days[selected] || [];
  const d = new Date(selected + 'T12:00:00');
  const dow = getDow(selected);

  let html = `<div class="detail-title">${DIAS_FULL[dow]}, ${d.getDate()} ${MESES[d.getMonth()]}</div>`;
  if (!blocks.length) {
    html += '<div class="empty-day">Dia livre</div>';
  } else {
    blocks.forEach(b => {
      const bdef = BLOCKS[b.type];
      const s = b.status;
      html += `
        <div class="block-row ${s}" data-date="${selected}" data-id="${b.id}"
          style="background:${bdef.bg};border:1px solid ${s==='perdido'?'#334155':bdef.color+'44'}">
          <div class="block-icon" style="background:${bdef.color}">${bdef.short}</div>
          <div class="block-info">
            <div class="block-type" style="color:${bdef.text}">${bdef.label}</div>
            <div class="block-note">${b.note}</div>
          </div>
          <div class="block-status status-${s}">
            ${s==='feito'?'✓ feito':s==='perdido'?'✕ falhou':'pendente'}
          </div>
        </div>`;
    });
    html += '<div class="detail-hint">toque para alternar · salva localmente até próximo sync</div>';
  }

  const detail = document.getElementById('detail');
  detail.innerHTML = html;

  detail.querySelectorAll('.block-row').forEach(row => {
    row.addEventListener('click', () => {
      const dateKey = row.dataset.date;
      const blockId = row.dataset.id;
      const block = planData.days[dateKey].find(b => b.id === blockId);
      if (!block) return;
      const cur = STATUS_CYCLE.indexOf(block.status);
      block.status = STATUS_CYCLE[(cur+1)%3];
      localStorage.setItem('secretario-cache', JSON.stringify(planData));
      render();
    });
  });
}

function updateHeader() {
  const dates = Object.keys(planData.days).sort();
  const first = new Date(dates[0] + 'T12:00:00');
  const last = new Date(dates[dates.length-1] + 'T12:00:00');
  document.getElementById('headerSub').textContent =
    `${first.getDate()} ${MESES[first.getMonth()]} – ${last.getDate()} ${MESES[last.getMonth()]} · toque num dia`;
}

loadPlan();
</script>
</body>
</html>
